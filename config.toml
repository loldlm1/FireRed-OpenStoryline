# FireRed-OpenStoryline remote MVP configuration.
# Secrets should be provided through the documented environment variables.

[project]
outputs_dir = "./outputs"

[remote_asr]
timeout = 180.0
language = ""

[ninerouter]
base_url = "" # Prefer NINEROUTER_URL.
api_key = ""  # Prefer NINEROUTER_KEY.
model = "cx/gpt-5.6-sol"
reasoning_effort = "medium"
timeout = 180.0
max_retries = 2

[remote_image]
base_url = "" # Prefer NINEROUTER_URL.
api_key = ""  # Prefer NINEROUTER_KEY.
models = ["cx/gpt-5.5-image"]
timeout = 180.0
max_bytes = 26214400
size = "1024x1024"

[mvp]
frame_count = 6
render_width = 1080
render_height = 1920
render_quality_profile = "high"
render_fps_cap = 60

[agentic_editing]
mode = "off"
shadow_allow_blocked_plans = true
baseline_fallbacks_enabled = false
max_segments_per_clip = 24
max_overlays_per_clip = 12
max_assets_per_clip = 4
generated_assets_enabled = false
max_generated_assets_per_clip = 2
pexels_enabled = false
max_stock_assets_per_clip = 2
pexels_license_reviewed_at = ""
pexels_search_limit = 8
pexels_timeout = 30.0
pexels_max_retries = 2
pexels_max_bytes = 83886080
pexels_max_video_duration_seconds = 60
creative_qa_enabled = true
creative_qa_strict = true
render_promotion_mode = "report"
completion_policy = "strict"
delivery_policy = "qa_enforced"
semantic_qa_enabled = false
semantic_qa_max_frames = 4
post_render_review_mode = "off"
render_evidence_max_frames_per_clip = 12
render_evidence_max_frames_total = 64
render_evidence_max_bursts_per_clip = 8
render_evidence_max_frame_bytes = 1500000
render_evidence_max_total_bytes = 12582912
render_evidence_max_width = 512
render_evidence_max_height = 512
render_evidence_timeout_seconds = 120.0
scene_threshold = 0.35
min_scene_duration_ms = 1000
max_scenes = 64
vision_frame_count = 12
vision_clip_frame_count = 6
vision_clip_repair_frame_count = 32
vision_frame_max_width = 512
vision_frame_max_height = 512
vision_frame_max_bytes = 1500000
crop_coverage_min_observations = 2
crop_coverage_min_ratio = 0.5
crop_coverage_max_gap_ms = 8000
crop_hysteresis_ratio = 0.03
crop_smoothing_alpha = 0.65
max_crop_velocity_ratio_per_second = 0.45

[ffmpega]
enabled = false
base_url = "http://127.0.0.1:8188"
timeout = 1800.0
poll_interval = 1.0
quality_preset = "high"
shared_local_root = ""
shared_remote_root = ""
