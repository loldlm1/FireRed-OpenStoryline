service: openstoryline-mvp
image: openstoryline-mvp
minimum_version: 2.12.0
secrets_path: <%= ENV.fetch("KAMAL_SECRETS_PATH", ".kamal/secrets") %>

servers:
  web:
    hosts:
      - <%= ENV.fetch("KAMAL_HOST") %>
<% if ENV.fetch("KAMAL_DOMAIN", "").strip.empty? %>
    proxy: false
<% end %>
    options:
      add-host: host.docker.internal:host-gateway
<% if ENV.fetch("KAMAL_DOMAIN", "").strip.empty? %>
      publish: "<%= ENV.fetch("KAMAL_HTTP_PORT", "80") %>:8000"
<% end %>

proxy:
  app_port: 8000
  forward_headers: true
  response_timeout: 3600
  healthcheck:
    path: /up
    interval: 3
    timeout: 10
  buffering:
    requests: true
    responses: true
    max_request_body: <%= ENV.fetch("OPENSTORYLINE_MAX_UPLOAD_BYTES", "8589934592") %>
    max_response_body: 0
    memory: 1048576
  run:
    http_port: <%= ENV.fetch("KAMAL_HTTP_PORT", "80") %>
    https_port: <%= ENV.fetch("KAMAL_HTTPS_PORT", "443") %>
<% unless ENV.fetch("KAMAL_DOMAIN", "").strip.empty? %>
  host: <%= ENV.fetch("KAMAL_DOMAIN") %>
  ssl: true
<% end %>

registry:
  server: localhost:5555

builder:
  arch: amd64
  dockerfile: Dockerfile.remote
  context: .

ssh:
  user: <%= ENV.fetch("KAMAL_SSH_USER", "root") %>
  port: <%= ENV.fetch("KAMAL_SSH_PORT", "22") %>

env:
  clear:
    OPENSTORYLINE_CONFIG: /app/config.toml
    NINEROUTER_URL: <%= ENV.fetch("NINEROUTER_URL") %>
    OPENSTORYLINE_LLM_MODEL: <%= ENV.fetch("OPENSTORYLINE_LLM_MODEL", "cx/gpt-5.6-sol") %>
    OPENSTORYLINE_REASONING_EFFORT: <%= ENV.fetch("OPENSTORYLINE_REASONING_EFFORT", "medium") %>
    OPENSTORYLINE_LLM_TIMEOUT: <%= ENV.fetch("OPENSTORYLINE_LLM_TIMEOUT", "180") %>
    OPENSTORYLINE_IMAGE_MODELS: <%= ENV.fetch("OPENSTORYLINE_IMAGE_MODELS", "cx/gpt-5.5-image") %>
    OPENSTORYLINE_IMAGE_TIMEOUT: <%= ENV.fetch("OPENSTORYLINE_IMAGE_TIMEOUT", "180") %>
    OPENSTORYLINE_IMAGE_MAX_BYTES: <%= ENV.fetch("OPENSTORYLINE_IMAGE_MAX_BYTES", "26214400") %>
    OPENSTORYLINE_IMAGE_SIZE: <%= ENV.fetch("OPENSTORYLINE_IMAGE_SIZE", "1024x1024") %>
    MISTRAL_STT_TIMEOUT: <%= ENV.fetch("MISTRAL_STT_TIMEOUT", "180") %>
    OPENSTORYLINE_MAX_UPLOAD_BYTES: <%= ENV.fetch("OPENSTORYLINE_MAX_UPLOAD_BYTES", "8589934592") %>
    OPENSTORYLINE_DATABASE_CONNECT_TIMEOUT: <%= ENV.fetch("OPENSTORYLINE_DATABASE_CONNECT_TIMEOUT", "10") %>
    OPENSTORYLINE_DATABASE_QUERY_TIMEOUT: <%= ENV.fetch("OPENSTORYLINE_DATABASE_QUERY_TIMEOUT", "5") %>
    OPENSTORYLINE_DATABASE_POOL_SIZE: <%= ENV.fetch("OPENSTORYLINE_DATABASE_POOL_SIZE", "5") %>
    OPENSTORYLINE_DATABASE_MAX_OVERFLOW: <%= ENV.fetch("OPENSTORYLINE_DATABASE_MAX_OVERFLOW", "5") %>
    OPENSTORYLINE_PUBLIC_ORIGIN: <%= ENV.fetch("OPENSTORYLINE_PUBLIC_ORIGIN") %>
    OPENSTORYLINE_ALLOW_INSECURE_HTTP: <%= ENV.fetch("OPENSTORYLINE_ALLOW_INSECURE_HTTP", "false") %>
    OPENSTORYLINE_SESSION_IDLE_HOURS: <%= ENV.fetch("OPENSTORYLINE_SESSION_IDLE_HOURS", "12") %>
    OPENSTORYLINE_SESSION_ABSOLUTE_DAYS: <%= ENV.fetch("OPENSTORYLINE_SESSION_ABSOLUTE_DAYS", "7") %>
    OPENSTORYLINE_SESSION_TOUCH_SECONDS: <%= ENV.fetch("OPENSTORYLINE_SESSION_TOUCH_SECONDS", "300") %>
    OPENSTORYLINE_LOGIN_RPM: <%= ENV.fetch("OPENSTORYLINE_LOGIN_RPM", "10") %>
    OPENSTORYLINE_LOGIN_RPD: <%= ENV.fetch("OPENSTORYLINE_LOGIN_RPD", "100") %>
    OPENSTORYLINE_LOGIN_GLOBAL_RPM: <%= ENV.fetch("OPENSTORYLINE_LOGIN_GLOBAL_RPM", "120") %>
    OPENSTORYLINE_LOGIN_GLOBAL_RPD: <%= ENV.fetch("OPENSTORYLINE_LOGIN_GLOBAL_RPD", "5000") %>
    OPENSTORYLINE_MAX_ACTIVE_JOBS: <%= ENV.fetch("OPENSTORYLINE_MAX_ACTIVE_JOBS", "20") %>
    OPENSTORYLINE_AUDIT_MAX_DOCUMENT_BYTES: <%= ENV.fetch("OPENSTORYLINE_AUDIT_MAX_DOCUMENT_BYTES", "2097152") %>
<% if ENV.fetch("KAMAL_DOMAIN", "").strip.empty? %>
    OPENSTORYLINE_TRUST_PROXY_HEADERS: "false"
<% end %>
<% unless ENV.fetch("KAMAL_DOMAIN", "").strip.empty? %>
    OPENSTORYLINE_TRUST_PROXY_HEADERS: "true"
<% end %>
    OPENSTORYLINE_FFMPEGA_ENABLED: <%= ENV.fetch("OPENSTORYLINE_FFMPEGA_ENABLED", "false") %>
    FFMPEGA_URL: <%= ENV.fetch("FFMPEGA_URL", "http://host.docker.internal:8188") %>
    FFMPEGA_LOCAL_OUTPUT_ROOT: /app/outputs
    FFMPEGA_REMOTE_OUTPUT_ROOT: "<%= ENV.fetch("FFMPEGA_REMOTE_OUTPUT_ROOT", "") %>"
  secret:
    - DATABASE_URL
    - OPENSTORYLINE_WEB_PASSWORD_HASH
    - OPENSTORYLINE_SECURITY_PEPPER
    - NINEROUTER_KEY
    - MISTRAL_API_KEYS

accessories:
  db:
    image: postgres:17-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
    host: <%= ENV.fetch("KAMAL_HOST") %>
    network: kamal
    env:
      clear:
        POSTGRES_DB: openstoryline
        POSTGRES_USER: postgres
        POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      secret:
        - OPENSTORYLINE_DATABASE_PASSWORD
        - POSTGRES_PASSWORD
    files:
      - local: scripts/mvp-postgres-init.sh
        remote: /docker-entrypoint-initdb.d/10-openstoryline-app.sh
        mode: "0755"
        owner: "999:999"
    options:
      restart: unless-stopped
      health-cmd: "pg_isready -U postgres -d openstoryline"
      health-interval: 10s
      health-timeout: 5s
      health-retries: 5
    directories:
      - local: <%= ENV.fetch("KAMAL_POSTGRES_DATA_DIR", "/var/lib/openstoryline/postgres") %>
        remote: /var/lib/postgresql/data
        mode: "0700"
        owner: "999:999"
      - local: <%= ENV.fetch("KAMAL_POSTGRES_BACKUP_DIR", "/var/lib/openstoryline/backups") %>
        remote: /backups
        mode: "0700"
        owner: "999:999"

volumes:
  - <%= ENV.fetch("KAMAL_OUTPUTS_DIR", "/var/lib/openstoryline/outputs") %>:/app/outputs

logging:
  driver: local
  options:
    max-size: 20m
    max-file: "5"

retain_containers: 3
deploy_timeout: 180
drain_timeout: 30
stop_timeout: 30
