<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenStoryline · Shorts remotos</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; background: #0b0d12; color: #f7f7f9; }
    main { width: min(760px, calc(100% - 32px)); margin: 0 auto; padding: 52px 0 80px; }
    h1 { margin: 0; font-size: clamp(2rem, 7vw, 4rem); letter-spacing: -.055em; }
    .lead { color: #aeb4c2; max-width: 620px; line-height: 1.6; }
    .card { margin-top: 28px; padding: 24px; border: 1px solid #292d38; border-radius: 18px; background: #12151d; }
    label { display: block; margin: 15px 0 7px; color: #d8dbe3; font-size: .92rem; }
    input, textarea, button { box-sizing: border-box; width: 100%; font: inherit; }
    input, textarea { padding: 12px 13px; border: 1px solid #353a48; border-radius: 10px; background: #0c0f15; color: #fff; }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 140px; gap: 14px; }
    button { margin-top: 18px; padding: 13px; border: 0; border-radius: 10px; background: #6d5dfc; color: white; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .55; cursor: wait; }
    progress { width: 100%; height: 10px; accent-color: #6d5dfc; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; color: #d7dbea; line-height: 1.45; }
    .artifact { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-top: 1px solid #292d38; }
    .artifact span { flex: 1; overflow-wrap: anywhere; }
    .artifact button, #bundle { width: auto; margin: 0; padding: 8px 12px; background: #292f3f; }
    .hidden { display: none; }
    @media (max-width: 580px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Video largo → shorts</h1>
  <p class="lead">Sube un video, describe los clips que quieres y descarga los MP4 verticales. La IA se ejecuta remotamente vía 9Router; este servidor sólo usa FFmpeg en CPU.</p>

  <form id="job-form" class="card">
    <label for="token">Token de acceso del servicio</label>
    <input id="token" type="password" autocomplete="current-password" required>
    <label for="video">Video de entrada</label>
    <input id="video" type="file" accept="video/*,.mkv,.mov,.webm" required>
    <label for="prompt">Prompt de edición</label>
    <textarea id="prompt" required placeholder="Extrae hasta 8 momentos contundentes sobre consejos prácticos, con buen gancho y sin repetir ideas."></textarea>
    <div class="row">
      <div></div>
      <div>
        <label for="max-clips">Máximo de clips</label>
        <input id="max-clips" type="number" min="1" max="50" value="8" required>
      </div>
    </div>
    <button id="submit" type="submit">Crear shorts</button>
  </form>

  <section id="status-card" class="card hidden">
    <progress id="progress" max="1" value="0"></progress>
    <pre id="status"></pre>
    <div id="artifacts"></div>
    <button id="bundle" class="hidden" type="button">Descargar todo (.zip)</button>
  </section>
</main>
<script>
  const form = document.querySelector('#job-form');
  const tokenInput = document.querySelector('#token');
  const submit = document.querySelector('#submit');
  const card = document.querySelector('#status-card');
  const statusBox = document.querySelector('#status');
  const progress = document.querySelector('#progress');
  const artifactsBox = document.querySelector('#artifacts');
  const bundleButton = document.querySelector('#bundle');
  tokenInput.value = sessionStorage.getItem('mvp-token') || '';
  let currentJob = '';

  const auth = () => ({ Authorization: `Bearer ${tokenInput.value}` });
  const api = async (url, options = {}) => {
    const response = await fetch(url, { ...options, headers: { ...auth(), ...(options.headers || {}) } });
    if (!response.ok) {
      let detail;
      try { detail = await response.json(); } catch { detail = { detail: response.statusText }; }
      throw new Error(JSON.stringify(detail));
    }
    return response;
  };
  const saveBlob = async (url, filename) => {
    const response = await api(url);
    const blobUrl = URL.createObjectURL(await response.blob());
    const link = document.createElement('a');
    link.href = blobUrl; link.download = filename; link.click();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
  };
  const showArtifacts = (job) => {
    artifactsBox.replaceChildren();
    for (const artifact of job.artifacts || []) {
      const row = document.createElement('div'); row.className = 'artifact';
      const name = document.createElement('span'); name.textContent = `${artifact.name} · ${artifact.kind}`;
      const button = document.createElement('button'); button.type = 'button'; button.textContent = 'Descargar';
      button.onclick = () => saveBlob(`/api/mvp/jobs/${job.id}/artifacts/${encodeURIComponent(artifact.name)}`, artifact.name);
      row.append(name, button); artifactsBox.append(row);
    }
    bundleButton.classList.toggle('hidden', !(job.artifacts || []).length);
  };
  const renderJob = (job) => {
    progress.value = job.progress || 0;
    statusBox.textContent = JSON.stringify({ id: job.id, estado: job.state, etapa: job.stage, clips: job.clip_count, error: job.error }, null, 2);
    showArtifacts(job);
  };
  const poll = async () => {
    try {
      const job = await (await api(`/api/mvp/jobs/${currentJob}`)).json();
      renderJob(job);
      if (!['completed', 'failed', 'cancelled'].includes(job.state)) setTimeout(poll, 2000);
      else submit.disabled = false;
    } catch (error) { statusBox.textContent = error.message; submit.disabled = false; }
  };
  form.addEventListener('submit', async (event) => {
    event.preventDefault(); submit.disabled = true; card.classList.remove('hidden'); artifactsBox.replaceChildren();
    sessionStorage.setItem('mvp-token', tokenInput.value);
    const body = new FormData();
    body.append('file', document.querySelector('#video').files[0]);
    body.append('prompt', document.querySelector('#prompt').value);
    body.append('max_clips', document.querySelector('#max-clips').value);
    try {
      const job = await (await api('/api/mvp/jobs', { method: 'POST', body })).json();
      currentJob = job.id; renderJob(job); setTimeout(poll, 800);
    } catch (error) { statusBox.textContent = error.message; submit.disabled = false; }
  });
  bundleButton.addEventListener('click', () => saveBlob(`/api/mvp/jobs/${currentJob}/bundle`, `${currentJob}-artifacts.zip`));
</script>
</body>
</html>
