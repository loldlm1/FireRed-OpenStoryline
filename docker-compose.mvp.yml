services:
  openstoryline-mvp:
    build:
      context: .
      dockerfile: Dockerfile.remote
    restart: unless-stopped
    env_file: .env.mvp
    environment:
      OPENSTORYLINE_CONFIG: /app/config.toml
    ports:
      - "${MVP_BIND_IP:-127.0.0.1}:${MVP_PORT:-8000}:8000"
    volumes:
      - "${OPENSTORYLINE_OUTPUTS_DIR:-./outputs}:/app/outputs"
      - "./config.toml:/app/config.toml:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tmpfs:
      - /tmp:size=2g
